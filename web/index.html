<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LateBoof — river gauges</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <span class="brand">LateBoof</span>
    <span class="header-sub">Text <strong>flow@lateboof.com</strong> from your InReach — flow comes back over satellite</span>
  </header>

  <div class="meta-row">
    <div class="legend">
      <span><span class="dot dot-low"></span>Below range</span>
      <span><span class="dot dot-good"></span>In range</span>
      <span><span class="dot dot-high"></span>Above range</span>
    </div>
    <span class="refresh-note" id="refresh-note">Loading…</span>
  </div>

  <div class="filter-bar">
    <input type="search" id="filter-input" class="search-input" placeholder="Search rivers…" autocomplete="off">
    <div class="status-btns">
      <button class="status-btn active" data-status="all">All</button>
      <button class="status-btn btn-low"  data-status="low">Low</button>
      <button class="status-btn btn-good" data-status="good">Good</button>
      <button class="status-btn btn-high" data-status="high">High</button>
      <button class="status-btn"          data-status="grey">No data</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-col="name">River</th>
          <th class="sortable col-location" data-col="location">Location</th>
          <th class="sortable" data-col="flow">Flow</th>
          <th class="sortable" data-col="text_key">Text this</th>
          <th class="sortable" data-col="updated">Updated</th>
        </tr>
      </thead>
      <tbody id="gauge-body"></tbody>
    </table>
  </div>

  <footer class="site-footer">
    <span>Add flow@lateboof.com as an InReach contact. Text a gauge name (e.g. <em>mf salmon</em>, <em>grand canyon</em>, <em>chilko</em>). No cell signal needed.</span>
    <a class="footer-status" href="status.html">Status</a>
  </footer>

  <script src="gauges.js"></script>
</body>
</html>
