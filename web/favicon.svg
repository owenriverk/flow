<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#191919"/>
  <!-- Orange border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#f60" stroke-width="2"/>
  <!-- Three diagonal staircase lines — river current / topo contour style -->
  <!-- Each line steps 4px right, 4px down -->
  <polyline fill="none" stroke="#f60" stroke-width="3" stroke-linejoin="miter" stroke-linecap="butt"
    points="4,4 8,4 8,8 12,8 12,12 16,12 16,16 20,16 20,20 24,20 24,24 28,24"/>
  <polyline fill="none" stroke="#f60" stroke-width="3" stroke-linejoin="miter" stroke-linecap="butt"
    points="4,11 8,11 8,15 12,15 12,19 16,19 16,23 20,23 20,27 24,27"/>
  <polyline fill="none" stroke="#f60" stroke-width="3" stroke-linejoin="miter" stroke-linecap="butt"
    points="4,18 8,18 8,22 12,22 12,26 16,26 16,30"/>
</svg>
